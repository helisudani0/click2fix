services:
  db:
    image: postgres:${POSTGRES_IMAGE_TAG:-16}
    container_name: c2f-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-click2fix}
      POSTGRES_USER: ${POSTGRES_USER:-click2fix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - c2f-db-data:/var/lib/postgresql/data
    ports:
      - "${C2F_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-click2fix} -d ${POSTGRES_DB:-click2fix}"]
      interval: 10s
      timeout: 5s
      retries: 12
    mem_reservation: "${DB_MEMORY_RESERVATION:-256M}"
    mem_limit: "${DB_MEMORY_LIMIT:-1024M}"
    cpus: "${DB_CPU_LIMIT:-1.00}"

  backend:
    image: ${C2F_BACKEND_IMAGE:?C2F_BACKEND_IMAGE is required}:${C2F_IMAGE_TAG:-latest}
    container_name: c2f-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${C2F_BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-click2fix}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-click2fix}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      C2F_ORCHESTRATION_MODE: endpoint
      C2F_ALLOW_DEMO_USERS: ${C2F_ALLOW_DEMO_USERS:-false}
      C2F_TRUSTED_HOSTS: ${C2F_TRUSTED_HOSTS:-localhost,127.0.0.1,*.localhost,backend,frontend,c2f-backend,c2f-frontend}
      C2F_CORS_ORIGINS: ${C2F_CORS_ORIGINS:-http://localhost:5173}
      WAZUH_URL: ${WAZUH_URL:?WAZUH_URL is required}
      WAZUH_USER: ${WAZUH_USER:?WAZUH_USER is required}
      WAZUH_PASSWORD: ${WAZUH_PASSWORD:?WAZUH_PASSWORD is required}
      INDEXER_URL: ${INDEXER_URL:?INDEXER_URL is required}
      INDEXER_USER: ${INDEXER_USER:?INDEXER_USER is required}
      INDEXER_PASSWORD: ${INDEXER_PASSWORD:?INDEXER_PASSWORD is required}
      OTX_API_KEY: ${OTX_API_KEY:-}
      C2F_WINDOWS_CONNECTOR_ENABLED: ${C2F_WINDOWS_CONNECTOR_ENABLED:-true}
      C2F_WINRM_USERNAME: ${C2F_WINRM_USERNAME:-}
      C2F_WINRM_PASSWORD: ${C2F_WINRM_PASSWORD:-}
      C2F_LINUX_CONNECTOR_ENABLED: ${C2F_LINUX_CONNECTOR_ENABLED:-false}
      C2F_SSH_USERNAME: ${C2F_SSH_USERNAME:-}
      C2F_SSH_PASSWORD: ${C2F_SSH_PASSWORD:-}
      C2F_CIRCUIT_BREAKER_ENABLED: ${C2F_CIRCUIT_BREAKER_ENABLED:-true}
      C2F_CIRCUIT_BREAKER_MEMORY_LIMIT_MB: ${BACKEND_MEMORY_LIMIT_MB:-2048}
      C2F_CIRCUIT_BREAKER_THRESHOLD_PERCENT: ${C2F_CIRCUIT_BREAKER_THRESHOLD_PERCENT:-90}
      C2F_CIRCUIT_BREAKER_POLL_SECONDS: ${C2F_CIRCUIT_BREAKER_POLL_SECONDS:-2}
      C2F_CIRCUIT_BREAKER_MAX_PAUSE_SECONDS: ${C2F_CIRCUIT_BREAKER_MAX_PAUSE_SECONDS:-120}
    volumes:
      - c2f-backend-data:/app/data
      - c2f-backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/docs',timeout=5).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    mem_reservation: "${BACKEND_MEMORY_RESERVATION:-1024M}"
    mem_limit: "${BACKEND_MEMORY_LIMIT:-2048M}"
    cpus: "${BACKEND_CPU_LIMIT:-2.00}"

  frontend:
    image: ${C2F_FRONTEND_IMAGE:?C2F_FRONTEND_IMAGE is required}:${C2F_IMAGE_TAG:-latest}
    container_name: c2f-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${C2F_FRONTEND_PORT:-5173}:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    mem_reservation: "${FRONTEND_MEMORY_RESERVATION:-256M}"
    mem_limit: "${FRONTEND_MEMORY_LIMIT:-512M}"
    cpus: "${FRONTEND_CPU_LIMIT:-1.00}"

volumes:
  c2f-db-data:
  c2f-backend-data:
  c2f-backend-logs:
